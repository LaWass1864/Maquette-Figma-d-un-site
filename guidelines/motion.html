<!-- @dsCard group="Brand" viewport="700x180" subtitle="One easing curve; quick hovers, generous scroll reveals" name="Motion" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ga-bg);padding:22px;font-family:var(--font-text);color:var(--ga-ink);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .c{border:1px solid var(--ga-line-2);padding:16px;}
  .k{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ga-accent);font-weight:700;margin-bottom:8px;}
  .v{font-size:13px;color:var(--ga-muted);font-family:monospace;line-height:1.6;}
  b{color:var(--ga-ink);}
</style></head>
<body>
  <div class="grid">
    <div class="c"><div class="k">Easing</div><div class="v"><b>--ease-out</b><br>cubic-bezier(.16,.7,.25,1)</div></div>
    <div class="c"><div class="k">Scroll reveal</div><div class="v">opacity 0→1 · translateY <b>34px</b><br>.85s · stagger 80ms</div></div>
    <div class="c"><div class="k">Hover · card</div><div class="v">lift <b>translateY(-6px)</b> · .35s<br>border → accent</div></div>
    <div class="c"><div class="k">Hover · photo</div><div class="v">zoom <b>scale(1.06)</b> · .65s<br>grayscale → colour</div></div>
  </div>
</body></html>
