<!-- @dsCard group="Spacing" viewport="700x160" subtitle="6 → 96px rhythm; 14px is the default grid gap" name="Spacing scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ga-bg);padding:22px;font-family:var(--font-text);display:flex;align-items:flex-end;gap:16px;}
  .b{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--ga-muted-2);font-size:10px;font-family:monospace;}
  .bar{width:26px;background:var(--ga-accent);}
</style></head>
<body>
  <div class="b"><div class="bar" style="height:6px"></div>6</div>
  <div class="b"><div class="bar" style="height:10px"></div>10</div>
  <div class="b"><div class="bar" style="height:14px"></div>14</div>
  <div class="b"><div class="bar" style="height:18px"></div>18</div>
  <div class="b"><div class="bar" style="height:24px"></div>24</div>
  <div class="b"><div class="bar" style="height:30px"></div>30</div>
  <div class="b"><div class="bar" style="height:40px"></div>40</div>
  <div class="b"><div class="bar" style="height:54px"></div>54</div>
  <div class="b"><div class="bar" style="height:66px"></div>66</div>
  <div class="b"><div class="bar" style="height:96px;background:var(--ga-ink)"></div>96</div>
</body></html>
