<!-- @dsCard group="Colors" viewport="700x190" subtitle="Warm-tinted blacks — page, sections, cards" name="Surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-text);background:#19191b;padding:20px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;height:130px;border:1px solid var(--ga-line-2);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
  .n{color:var(--ga-ink);font-size:12px;font-weight:700;}
  .h{color:var(--ga-muted-2);font-size:11px;font-family:monospace;margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ga-bg)"><span class="n">Page</span><span class="h">--ga-bg · #0c0c0e</span></div>
    <div class="sw" style="background:var(--ga-bg-alt)"><span class="n">Section alt</span><span class="h">--ga-bg-alt · #0a0a0c</span></div>
    <div class="sw" style="background:var(--ga-surface)"><span class="n">Surface</span><span class="h">--ga-surface · #141416</span></div>
    <div class="sw" style="background:var(--ga-surface-2)"><span class="n">Surface hover</span><span class="h">--ga-surface-2 · #1a1a1d</span></div>
  </div>
</body></html>
