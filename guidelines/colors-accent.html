<!-- @dsCard group="Colors" viewport="700x190" subtitle="One burnt-orange accent — the only chroma in the system" name="Accent" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-text);background:var(--ga-bg);padding:20px;}
  .row{display:flex;gap:14px;align-items:stretch;}
  .big{flex:1.4;height:130px;background:var(--ga-accent);display:flex;flex-direction:column;justify-content:flex-end;padding:14px;}
  .big .n{color:#0c0c0e;font-size:14px;font-weight:800;}
  .big .h{color:#0c0c0e;opacity:.7;font-size:11px;font-family:monospace;margin-top:2px;}
  .stack{flex:1;display:flex;flex-direction:column;gap:14px;}
  .s{flex:1;border:1px solid var(--ga-line-2);display:flex;align-items:center;padding:0 14px;color:var(--ga-ink);font-size:11px;font-family:monospace;}
</style></head>
<body>
  <div class="row">
    <div class="big"><span class="n">Burnt Orange</span><span class="h">--ga-accent · #e1621d</span></div>
    <div class="stack">
      <div class="s" style="box-shadow:var(--ring-accent)">--ring-accent · glow 0.18</div>
      <div class="s" style="background:var(--ga-accent-glow)">--ga-accent-glow</div>
      <div class="s" style="background:var(--ga-accent-shadow)">--ga-accent-shadow · 0.35</div>
    </div>
  </div>
</body></html>
