<!-- @dsCard group="Type" viewport="700x150" subtitle="Uppercase tracked eyebrows & the record numeral" name="Labels & numerals" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ga-bg);padding:22px;font-family:var(--font-text);display:flex;align-items:center;gap:40px;}
  .labels{display:flex;flex-direction:column;gap:12px;}
  .ey{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--ga-accent);font-weight:700;}
  .nav{font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ga-muted);font-weight:600;}
  .badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--ga-line-3);padding:8px 14px;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ga-ink-soft);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ga-accent);}
  .num{font-family:var(--font-display);font-size:64px;line-height:1;color:var(--ga-accent);}
</style></head>
<body>
  <div class="labels">
    <span class="ey">Les Objectifs</span>
    <span class="badge"><span class="dot"></span>Boxe Anglaise · Amateur Élite</span>
    <span class="nav">Parcours · Objectifs · Médias</span>
  </div>
  <div class="num">20</div>
</body></html>
