<!-- @dsCard group="Brand" viewport="700x230" subtitle="Desaturated at rest, warms to colour on hover; hero runs full B&W" name="Image treatment" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ga-bg);padding:20px;font-family:var(--font-text);}
  .row{display:flex;gap:14px;}
  figure{margin:0;flex:1;}
  .frame{aspect-ratio:4/3;background:var(--ga-surface);overflow:hidden;}
  .frame > div{width:100%;height:100%;background-size:cover;background-position:center;}
  figcaption{margin-top:8px;color:var(--ga-muted-2);font-size:11px;font-family:monospace;}
  .rest > div{filter:var(--img-rest);}
  .hover > div{filter:var(--img-hover);}
  .hero > div{filter:var(--img-hero);}
</style></head>
<body>
  <div class="row">
    <figure class="rest"><div class="frame"><div style="background-image:url('../assets/sparring.png')"></div></div><figcaption>rest · grayscale .2</figcaption></figure>
    <figure class="hover"><div class="frame"><div style="background-image:url('../assets/sparring.png')"></div></div><figcaption>hover · full colour</figcaption></figure>
    <figure class="hero"><div class="frame"><div style="background-image:url('../assets/victory-ring.png')"></div></div><figcaption>hero · full B&amp;W</figcaption></figure>
  </div>
</body></html>
