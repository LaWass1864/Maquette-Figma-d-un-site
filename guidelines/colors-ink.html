<!-- @dsCard group="Colors" viewport="700x200" subtitle="Warm off-white to faint grey — text hierarchy on dark" name="Ink & text" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-text);background:var(--ga-bg);padding:22px;}
  .line{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--ga-line);}
  .t{font-size:17px;font-weight:600;flex:1;}
  .h{font-family:monospace;font-size:11px;color:var(--ga-muted-2);}
</style></head>
<body>
  <div class="line"><span class="t" style="color:var(--ga-ink)">Primary — headlines & key copy</span><span class="h">--ga-ink #f4f1ea</span></div>
  <div class="line"><span class="t" style="color:var(--ga-ink-soft)">Soft — leads over imagery</span><span class="h">--ga-ink-soft #cdcac2</span></div>
  <div class="line"><span class="t" style="color:var(--ga-muted)">Muted — body copy</span><span class="h">--ga-muted #9a978f</span></div>
  <div class="line"><span class="t" style="color:var(--ga-muted-2)">Caption — meta & labels</span><span class="h">--ga-muted-2 #8a877f</span></div>
  <div class="line" style="border:none"><span class="t" style="color:var(--ga-faint)">Faint — de-emphasised numerals</span><span class="h">--ga-faint #5a5852</span></div>
</body></html>
