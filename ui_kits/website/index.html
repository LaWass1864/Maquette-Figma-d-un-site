<!-- @dsCard group="Website" viewport="1280x820" subtitle="Guilhem Angui — full one-page site recreation" name="Site — one-pager" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guilhem Angui — UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--ga-bg); color: var(--ga-ink); font-family: var(--font-text); }
  ::selection { background: var(--ga-accent); color: #0c0c0e; }
  a { color: inherit; }
  nav.bar { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; backdrop-filter: var(--blur-nav); background: rgba(12,12,14,0.72); border-bottom: 1px solid var(--ga-line); }
  nav .lock { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  nav .d { width: 11px; height: 11px; background: var(--ga-accent); transform: rotate(45deg); }
  nav .wm { font-family: var(--font-display); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }
  nav .links { display: flex; align-items: center; gap: 34px; font-size: 12.5px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  nav .links a { color: var(--ga-muted); text-decoration: none; transition: color .25s; }
  nav .links a:hover { color: #fff; }
  nav .cta { background: var(--ga-accent); color: #0c0c0e !important; padding: 10px 18px; font-weight: 800; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<nav class="bar">
  <a class="lock" href="#top"><span class="d"></span><span class="wm">Guilhem Angui</span></a>
  <div class="links">
    <a href="#sponsoring">Médias</a>
    <a href="#sponsoring" class="cta">Devenir partenare</a>
  </div>
</nav>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  function R(name){
    for (const k of Object.keys(window)) {
      const v = window[k];
      if (v && typeof v === 'object' && typeof v[name] === 'function') return v[name];
    }
    return () => React.createElement('div', { style:{padding:40,color:'#e1621d'} }, '⚠ missing '+name);
  }
  const Hero = R('Hero'), RecordBand = R('RecordBand'), NobleArt = R('NobleArt'), SponsorCTA = R('SponsorCTA');
  function Site(){
    return (
      <div id="top">
        <Hero />
        <RecordBand />
        <NobleArt />
        <SponsorCTA />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Site/>);
</script>
</body>
</html>
